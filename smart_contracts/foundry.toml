[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 10000
solc_version = "0.8.30"
evm_version = "cancun"
ffi = true
# Enable file reading permissions
fs_permissions = [{ access = "read-write", path = "./" }]


[profile.lite]
optimizer = false
solc_version = "0.8.30"
evm_version = "cancun"